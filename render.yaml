# Render Blueprint — deploys the Vela backend (NestJS, Docker) + PostgreSQL.
# The frontend goes to Netlify separately (see docs/DEPLOY_RU.md).
#
# Usage: in Render → "New +" → "Blueprint" → pick your GitHub repo.
# Render reads this file and creates the database + API service automatically.

databases:
  - name: vela-db
    plan: free

services:
  - type: web
    name: vela-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vela-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Set this to your Netlify URL after the frontend is deployed, then redeploy.
      - key: CORS_ORIGIN
        sync: false
