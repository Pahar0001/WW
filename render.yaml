# ─────────────────────────────────────────────────────────────────────────────
# Vela — full deployment architecture as a single Render Blueprint.
#
#   PostgreSQL (vela-db)  ←  NestJS API (vela-api)  ←  Next.js web (vela-web)
#
# Deploy: Render dashboard → "New +" → "Blueprint" → pick this repo → Apply.
# Render reads this file and provisions all three. Then set the two `sync:false`
# variables (see steps in docs/DEPLOY_RU.md) and redeploy the web service once.
#
# Monorepo note: dockerfilePath and dockerContext are relative to the REPOSITORY
# ROOT (not a rootDir). This is what makes Render find each Dockerfile.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: vela-db
    plan: free

services:
  # ── Backend API (Docker) ──────────────────────────────────────────────
  - type: web
    name: vela-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vela-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # Auth: JWT secret is auto-generated; the rest are set by you.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: 7d
      # Public frontend URL — used in verification/reset email links.
      # Set to the vela-web URL, e.g. https://vela-web-zr2u.onrender.com
      - key: APP_URL
        sync: false
      # First Super Admin (created automatically on boot). Set both.
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      # Optional email provider; if unset, links are logged to the API console.
      - key: RESEND_API_KEY
        sync: false
      # Optional S3-compatible file storage (Cloudflare R2 recommended).
      # If unset, uploads use local disk (ephemeral on free tier).
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      # CORS not needed: the browser never calls the API cross-origin (the web
      # app proxies it). Left permissive by default.

  # ── Frontend web (Docker, Next.js standalone) ─────────────────────────
  - type: web
    name: vela-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    autoDeploy: true
    envVars:
      # The ONLY thing to set: the backend's base URL (no /api, no trailing slash),
      # e.g. https://vela-api.onrender.com . This is read at RUNTIME — just set it
      # and the service redeploys; no "clear build cache" needed.
      - key: BACKEND_URL
        sync: false
