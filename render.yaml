# ─────────────────────────────────────────────────────────────────────────────
# Vela — full deployment architecture as a single Render Blueprint.
#
#   PostgreSQL (vela-db)  ←  NestJS API (vela-api)  ←  Next.js web (vela-web)
#
# Deploy: Render dashboard → "New +" → "Blueprint" → pick this repo → Apply.
# Render reads this file and provisions all three. Then set the two `sync:false`
# variables (see steps in docs/DEPLOY_RU.md) and redeploy the web service once.
#
# Monorepo note: dockerfilePath and dockerContext are relative to the REPOSITORY
# ROOT (not a rootDir). This is what makes Render find each Dockerfile.
# ─────────────────────────────────────────────────────────────────────────────

databases:
  - name: vela-db
    plan: free

services:
  # ── Backend API (Docker) ──────────────────────────────────────────────
  - type: web
    name: vela-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vela-db
          property: connectionString
      - key: NODE_ENV
        value: production
      # CORS not needed: the browser never calls the API cross-origin (the web
      # app proxies it). Left permissive by default.

  # ── Frontend web (Docker, Next.js standalone) ─────────────────────────
  - type: web
    name: vela-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    autoDeploy: true
    envVars:
      # The ONLY thing to set: the backend's base URL (no /api, no trailing slash),
      # e.g. https://vela-api.onrender.com . This is read at RUNTIME — just set it
      # and the service redeploys; no "clear build cache" needed.
      - key: BACKEND_URL
        sync: false
