services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vela}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-vela}
    ports:
      - "5432:5432"
    volumes:
      - vela_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vela}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://vela:change_me_in_production@db:5432/vela?schema=public}
      API_PORT: ${API_PORT:-4000}
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    # On boot: sync schema (reference build uses db push), seed (best-effort,
    # idempotent), then start the API. Seed failure must not block the API.
    # For real environments, replace `db push` with `prisma migrate deploy`.
    command: sh -c "npx prisma db push --skip-generate && (npm run seed || echo 'seed step skipped') && node dist/main.js"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Browser-facing (inlined at build via build args too).
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      # Server-side fetch inside the Docker network must reach the backend
      # service by name, NOT localhost (localhost = the web container itself).
      API_INTERNAL_URL: http://backend:4000/api
    ports:
      - "3000:3000"

volumes:
  vela_pgdata:
