services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vela}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-vela}
    ports:
      - "5432:5432"
    volumes:
      - vela_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vela}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://vela:change_me_in_production@db:5432/vela?schema=public}
      API_PORT: ${API_PORT:-4000}
      NODE_ENV: ${NODE_ENV:-development}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Vela <onboarding@resend.dev>}
      # Travelpayouts (Aviasales Data API) — реальные цены авиабилетов.
      TRAVELPAYOUTS_TOKEN: ${TRAVELPAYOUTS_TOKEN:-}
      # Партнёрский marker Travelpayouts — комиссия с переходов на Aviasales.
      TRAVELPAYOUTS_MARKER: ${TRAVELPAYOUTS_MARKER:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
    ports:
      - "4000:4000"
    volumes:
      # Persist user-uploaded images across restarts.
      - vela_uploads:/app/uploads
    # On boot: sync schema (reference build uses db push), seed (best-effort,
    # idempotent), then start the API. Seed failure must not block the API.
    # For real environments, replace `db push` with `prisma migrate deploy`.
    command: sh -c "npx prisma db push --skip-generate && (npm run seed || echo 'seed step skipped') && node dist/main.js"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Single runtime variable: where the backend lives. The Next.js server
      # proxies the browser's /api and /uploads calls here, and Server Components
      # fetch it directly. No build-time API URL, no CORS config needed.
      BACKEND_URL: http://backend:4000
    ports:
      - "3000:3000"

volumes:
  vela_pgdata:
  vela_uploads:
