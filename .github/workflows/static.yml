# Publishes the static landing page (index.html) to GitHub Pages.
# This repo's full app (Next.js + NestJS + Postgres) is NOT statically exportable
# and is deployed elsewhere (see docs/DEPLOY_RU.md). GitHub Pages only serves the
# static preview at the repository root.
name: Deploy static site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage static files
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp .nojekyll _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
